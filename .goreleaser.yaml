version: 2

builds:
  - main: .
    binary: bilt
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.version={{.Version}} -X main.commit={{.ShortCommit}} -X main.date={{.Date}} -X main.baseURL=https://app.bilt.me

archives:
  - format: tar.gz
    name_template: "{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        format: zip

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"

brews:
  - repository:
      owner: buildingapplications
      name: homebrew-tap
    name: bilt
    homepage: "https://bilt.me"
    description: "Build and install your Bilt app on your iPhone"
    install: |
      bin.install "bilt"
    test: |
      system "#{bin}/bilt", "--help"
