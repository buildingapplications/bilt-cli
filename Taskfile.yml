version: "3"

vars:
  VERSION:
    sh: git describe --tags --always --dirty 2>/dev/null || echo "dev"
  COMMIT:
    sh: git rev-parse --short HEAD 2>/dev/null || echo "none"
  BINARY: bilt

tasks:
  default:
    desc: Show available tasks
    cmds:
      - task --list-all

  # ── Development ──────────────────────────────────────────────────────

  build:
    desc: Build the binary for the current platform
    cmds:
      - go build -ldflags "-s -w -X main.version={{.VERSION}} -X main.commit={{.COMMIT}} -X main.date={{.DATE}}" -o {{.BINARY}} .
    vars:
      DATE:
        sh: date -u +%Y-%m-%dT%H:%M:%SZ

  lint:
    desc: Run golangci-lint
    cmds:
      - golangci-lint run ./...

  test:
    desc: Run tests
    cmds:
      - go test -race ./...

  fmt:
    desc: Format code
    cmds:
      - gofmt -w .
      - goimports -w .

  vet:
    desc: Run go vet
    cmds:
      - go vet ./...

  check:
    desc: Run all checks (lint + vet + test)
    cmds:
      - task: lint
      - task: vet
      - task: test

  clean:
    desc: Remove build artifacts
    cmds:
      - rm -f {{.BINARY}}
      - rm -rf dist/

  # ── Release ──────────────────────────────────────────────────────────

  version:
    desc: Show what the next version would be and why
    cmds:
      - ./scripts/next-version.sh --dry

  release:
    desc: "Auto-bump version, tag, run checks, and publish with goreleaser"
    preconditions:
      - sh: test -z "$(git status --porcelain)"
        msg: "Working directory is dirty — commit or stash changes first"
      - sh: test "$(git branch --show-current)" = "main"
        msg: "Must be on the main branch"
      - sh: git fetch origin main --quiet && git diff --quiet origin/main..HEAD
        msg: "Local main is out of sync with origin — pull/push first"
      - sh: which goreleaser >/dev/null 2>&1
        msg: "goreleaser not found — install it: brew install goreleaser"
    vars:
      TAG:
        sh: ./scripts/next-version.sh
    cmds:
      - task: check
      - echo ""
      - ./scripts/next-version.sh --dry
      - echo ""
      - echo "Tagging {{.TAG}}..."
      - git tag -a {{.TAG}} -m "Release {{.TAG}}"
      - git push origin {{.TAG}}
      - goreleaser release --clean
      - echo ""
      - echo "Released {{.TAG}}."

  release:dry:
    desc: "Test the release build without publishing"
    cmds:
      - goreleaser release --snapshot --clean

  release:tag:
    desc: "Only auto-bump and push the tag (no goreleaser)"
    preconditions:
      - sh: test -z "$(git status --porcelain)"
        msg: "Working directory is dirty — commit or stash changes first"
      - sh: test "$(git branch --show-current)" = "main"
        msg: "Must be on the main branch"
      - sh: git fetch origin main --quiet && git diff --quiet origin/main..HEAD
        msg: "Local main is out of sync with origin — pull/push first"
    vars:
      TAG:
        sh: ./scripts/next-version.sh
    cmds:
      - task: check
      - echo ""
      - ./scripts/next-version.sh --dry
      - echo ""
      - echo "Tagging {{.TAG}}..."
      - git tag -a {{.TAG}} -m "Release {{.TAG}}"
      - git push origin {{.TAG}}
      - echo ""
      - echo "Tag {{.TAG}} pushed. Run 'task release' or use goreleaser manually."
